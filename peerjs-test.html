<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>PeerJS Test</title>
<style>
body { font-family: sans-serif; padding: 20px; background: #0f172a; color: #e2e8f0; }
button { padding: 12px 24px; font-size: 16px; margin: 10px; cursor: pointer; }
#log { margin-top: 20px; padding: 10px; background: #1e293b; border-radius: 8px; font-family: monospace; font-size: 13px; line-height: 1.6; }
.ok { color: #10b981; }
.fail { color: #ef4444; }
</style>
</head>
<body>
<h2>PeerJS 联机测试</h2>
<p>使用与游戏完全相同的配置</p>
<button onclick="testCreate()">创建房间 (Host)</button>
<button onclick="testJoin()">加入房间 (Client)</button>
<div id="log"></div>

<script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>
<script>
var logEl = document.getElementById('log');
var currentPeer = null;

function log(msg, cls) {
  logEl.innerHTML += '<div class="' + (cls || '') + '">' + msg + '</div>';
}

function testCreate() {
  log('=== 创建房间测试 ===');
  log('PeerJS library loaded: ' + (typeof Peer !== 'undefined' ? 'YES' : 'NO'), typeof Peer !== 'undefined' ? 'ok' : 'fail');
  
  if (typeof Peer === 'undefined') return;
  
  var roomCode = '';
  for (var i = 0; i < 6; i++) roomCode += Math.floor(Math.random() * 10);
  var peerId = 'medicard-' + roomCode + '-host';
  
  log('Room code: ' + roomCode);
  log('Peer ID: ' + peerId);
  log('Config: host=localhost, port=9000, path=/medicard, secure=false');
  log('Connecting to PeerJS server...');
  
  try {
    if (currentPeer) { try { currentPeer.destroy(); } catch(e) {} }
    
    currentPeer = new Peer(peerId, {
      host: 'localhost',
      port: 9000,
      path: '/medicard',
      secure: false,
      debug: 3
    });
    
    currentPeer.on('open', function(id) {
      log('>> SUCCESS: Connected with ID: ' + id, 'ok');
    });
    
    currentPeer.on('connection', function(conn) {
      log('>> Incoming connection from: ' + conn.peer);
    });
    
    currentPeer.on('error', function(err) {
      log('>> ERROR: type=' + err.type + ', message=' + (err.message || 'none'), 'fail');
    });
    
    currentPeer.on('disconnected', function() {
      log('>> Disconnected');
    });
    
  } catch(e) {
    log('>> EXCEPTION: ' + e.message, 'fail');
  }
}

function testJoin() {
  var code = prompt('输入6位房间号:');
  if (!code || code.length !== 6) return;
  
  log('=== 加入房间测试 ===');
  
  var clientId = 'medicard-' + code + '-client-' + Math.random().toString(36).substr(2, 6);
  var hostId = 'medicard-' + code + '-host';
  log('Connecting as: ' + clientId);
  log('Host ID: ' + hostId);
  
  try {
    if (currentPeer) { try { currentPeer.destroy(); } catch(e) {} }
    
    currentPeer = new Peer(clientId, {
      host: 'localhost',
      port: 9000,
      path: '/medicard',
      secure: false,
      debug: 3
    });
    
    currentPeer.on('open', function(id) {
      log('>> Connected with ID: ' + id, 'ok');
      log('>> Connecting to host...');
      var conn = currentPeer.connect(hostId, { reliable: true });
      
      conn.on('open', function() {
        log('>> SUCCESS: Connected to host!', 'ok');
        conn.send('Hello from client!');
      });
      
      conn.on('data', function(data) {
        log('>> Data from host: ' + data);
      });
      
      conn.on('error', function(err) {
        log('>> Connection error: ' + (err.message || err), 'fail');
      });
    });
    
    currentPeer.on('error', function(err) {
      log('>> ERROR: type=' + err.type + ', message=' + (err.message || 'none'), 'fail');
    });
    
  } catch(e) {
    log('>> EXCEPTION: ' + e.message, 'fail');
  }
}
</script>
</body>
</html>
