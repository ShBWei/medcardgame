# MediCard Cloud API — Cloudflare Worker + D1
name = "medcard-api"
main = "workers/api/worker.js"
compatibility_date = "2026-05-16"
compatibility_flags = ["nodejs_compat"]

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "medcard-db"
database_id = "96769cc4-ec36-46ca-8c39-0d16ec760e21"

# Observability (free tier)
[observability]
enabled = true
